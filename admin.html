<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Boundless Moments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
    </header>
    <main>
        <section class="login-section">
            <div class="login-card">
                <h2>Login to Your Account</h2>
                <form id="loginForm">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                    <label for="password">Password:</label>
                    <input type="password" id="password" required>
                    <button type="submit">Login</button>
                </form>
                <p>Demo Credentials: <br> Email: admin@example.com <br> Password: password123</p>
            </div>
        </section>
        <section id="dashboard" class="hidden">
            <nav class="sidebar">
                <ul>
                    <li><a href="#enquiries">Enquiries</a></li>
                    <li><a href="#stats">Statistics</a></li>
                    <li><a href="#notes">Admin Notes</a></li>
                </ul>
            </nav>
            <div class="stats-cards">
                <div class="stat-card">
                    <h3>Total Enquiries</h3>
                    <p id="totalEnquiries">0</p>
                </div>
                <div class="stat-card">
                    <h3>New Enquiries</h3>
                    <p id="newEnquiries">0</p>
                </div>
            </div>
            <section id="enquiries">
                <h2>Enquiries</h2>
                <table id="enquiriesTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Service</th>
                            <th>Date</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Enquiries will be populated here -->
                    </tbody>
                </table>
            </section>
            <section id="notes">
                <h2>Admin Notes</h2>
                <textarea id="adminNotes" placeholder="Write your notes here..."></textarea>
            </section>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
